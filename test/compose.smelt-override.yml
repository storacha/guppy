# This file overrides the Smelt Compose configuration. Paths are relative to
# that file, not this one.

services:
  upload:
    environment:
      - SPRUE_LOG_LEVEL=debug
    volumes:
      - ../upload-config:/etc/sprue:ro

networks:
  storacha-network:
    # Use an isolated network, not the normal Smelt network.
    external: false
