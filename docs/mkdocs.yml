site_name: Guppy Docs
site_url: https://storacha.github.io/guppy
repo_url: https://github.com/storacha/guppy
docs_dir: content
site_dir: site
markdown_extensions:
  - md_in_html
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
theme:
  name: material
  features:
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - content.code.copy
  palette:
    - scheme: slate
      primary: indigo
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

extra_css:
  - styles/branding.css

nav:
  - Getting Started: index.md
  - Configuration: configuration.md
  - CLI Reference:
      - cli/index.md
      - login: cli/login.md
      - whoami: cli/whoami.md
      - version: cli/version.md
      - reset: cli/reset.md
      - list: cli/list.md
      - retrieve: cli/retrieve.md
      - verify: cli/verify.md
      - account:
          - cli/account/index.md
          - list: cli/account/list.md
      - space:
          - cli/space/index.md
          - generate: cli/space/generate.md
          - list: cli/space/list.md
          - info: cli/space/info.md
          - provision: cli/space/provision.md
      - upload:
          - cli/upload/index.md
          - check: cli/upload/check.md
          - source:
              - cli/upload/source/index.md
              - add: cli/upload/source/add.md
              - list: cli/upload/source/list.md
      - delegation:
          - cli/delegation/index.md
          - create: cli/delegation/create.md
      - proof:
          - cli/proof/index.md
          - add: cli/proof/add.md
      - gateway:
          - cli/gateway/index.md
          - serve: cli/gateway/serve.md
      - blob:
          - cli/blob/index.md
          - list: cli/blob/list.md
      - unixfs:
          - cli/unixfs/index.md
          - ls: cli/unixfs/ls.md
  - Troubleshooting: troubleshooting.md
