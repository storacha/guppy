version: 2

project_name: guppy

builds:
  - id: guppy
    main: ./
    binary: guppy
    ldflags:
      # Sets the version variable in the build package to the build version prefixed with a 'v'
      # Sets the main.date to a static date for checksum verification. See https://goreleaser.com/customization/builds/#reproducible-builds.
      - -s -w -X github.com/storacha/guppy/pkg/build.version=v{{.Version}} -X github.com/storacha/guppy/pkg/build.Commit={{.Commit}} -X github.com/storacha/guppy/pkg/build.Date={{.CommitDate}} -X github.com/storacha/guppy/pkg/build.BuiltBy=goreleaser
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - 'amd64'
      - 'arm64'
    # Change to a static date for checksum verification. See https://goreleaser.com/customization/builds/#reproducible-builds.
    mod_timestamp: '{{.CommitTimestamp}}'
    env:
      - CGO_ENABLED=0

universal_binaries:
  - replace: true

archives:
  - formats:
      - tar.gz
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      guppy_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats:
          - zip
      - goos: darwin
        formats:
          - zip

release:
  mode: keep-existing

changelog:
  disable: true

dockers:
  # AMD64 image
  - image_templates:
      - "ghcr.io/storacha/guppy:{{ .Version }}-amd64"
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
    goarch: amd64

  # ARM64 image
  - image_templates:
      - "ghcr.io/storacha/guppy:{{ .Version }}-arm64"
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/storacha/guppy:{{ .Version }}"
    image_templates:
      - "ghcr.io/storacha/guppy:{{ .Version }}-amd64"
      - "ghcr.io/storacha/guppy:{{ .Version }}-arm64"
